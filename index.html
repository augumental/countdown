<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown | Badeye</title>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-glow: #1a1a3a;
            --discord-blue: #5865F2;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Pulsing Gradient Background */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, var(--bg-dark) 70%);
            z-index: -2;
            animation: pulse 6s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .content {
            text-align: center;
            z-index: 10;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        #timer {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #discord-link {
            display: none;
            font-size: 1.8rem;
            color: var(--discord-blue);
            text-decoration: none;
            font-weight: bold;
            padding: 15px 30px;
            border: 2px solid var(--discord-blue);
            border-radius: 10px;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }

        #discord-link:hover {
            background: var(--discord-blue);
            color: white;
            box-shadow: 0 0 20px var(--discord-blue);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="gradient-overlay"></div>
    <canvas id="pCanvas"></canvas>

    <div class="content">
        <h1 id="status">System Offline</h1>
        <div id="timer">12:00:00</div>
        <a href="https://discord.gg/badeye" id="discord-link">discord.gg/badeye</a>
    </div>

    <script>
        // --- 1. COUNTDOWN LOGIC (Hardcoded to 12 Hours in EST) ---
        function getESTTime() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
        }

        const startTime = getESTTime().getTime();
        const endTime = startTime + (12 * 60 * 60 * 1000);

        function update() {
            const now = getESTTime().getTime();
            const diff = endTime - now;

            if (diff <= 0) {
                document.getElementById('timer').style.display = 'none';
                document.getElementById('status').innerText = 'Connection Established';
                document.getElementById('discord-link').style.display = 'inline-block';
                return;
            }

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('timer').innerText = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        setInterval(update, 1000);
        update();

        // --- 2. PARTICLES LOGIC ---
        const canvas = document.getElementById('pCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 0.5 + 0.1;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.size = Math.random() * 1.5;
            }
            draw() {
                this.y -= this.speed;
                if (this.y < 0) this.init();
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
