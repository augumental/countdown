<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown | Badeye</title>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-glow: #1a1a3a;
            --discord-blue: #5865F2;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, var(--bg-dark) 70%);
            z-index: -2;
            animation: pulse 6s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .content {
            text-align: center;
            z-index: 10;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.4);
        }

        #timer {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: -3px;
            margin: 0;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #discord-link {
            display: none;
            font-size: 1.5rem;
            color: var(--discord-blue);
            text-decoration: none;
            font-weight: bold;
            padding: 12px 24px;
            margin-top: 20px;
            border: 1px solid rgba(88, 101, 242, 0.4);
            border-radius: 8px;
            background: rgba(88, 101, 242, 0.05);
            transition: all 0.3s ease;
        }

        #discord-link:hover {
            background: var(--discord-blue);
            color: white;
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.5);
        }
    </style>
</head>
<body>

    <div class="gradient-overlay"></div>
    <canvas id="pCanvas"></canvas>

    <div class="content">
        <h1 id="status">Syncing with EST Terminal</h1>
        <div id="timer">12:00:00</div>
        <a href="https://discord.gg/badeye" id="discord-link">discord.gg/badeye</a>
    </div>

    <script>
        // --- YOUR UNIQUE IDENTIFIER ---
        console.log("RXo2SYKUCZE");

        // --- 1. COUNTDOWN LOGIC (EST) ---
        function getESTTime() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
        }

        const targetTime = getESTTime().getTime() + (12 * 60 * 60 * 1000);

        function update() {
            const now = getESTTime().getTime();
            const diff = targetTime - now;

            if (diff <= 0) {
                document.getElementById('timer').style.display = 'none';
                document.getElementById('status').innerText = 'Phase 1 Complete';
                document.getElementById('discord-link').style.display = 'inline-block';
                return;
            }

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('timer').innerText = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        setInterval(update, 1000);
        update();

        // --- 2. PARTICLE ENGINE ---
        const canvas = document.getElementById('pCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 0.4 + 0.1;
                this.opacity = Math.random() * 0.4;
                this.size = Math.random() * 1.2;
            }
            draw() {
                this.y -= this.speed;
                if (this.y < 0) this.init();
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 70; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
