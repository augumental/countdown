<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badeye | Terminal</title>
    <style>
        :root {
            --bg: #030303;
            --glow: #1a1a3a;
            --discord: #5865F2;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Pulsing Mesh Gradient */
        .bg-pulse {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--glow) 0%, var(--bg) 80%);
            z-index: -2;
            animation: pulseBg 10s ease-in-out infinite alternate;
        }

        @keyframes pulseBg {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .glass-panel {
            text-align: center; z-index: 10; padding: 60px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        #status-text {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 10px; margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.3);
        }

        #timer {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 900; letter-spacing: -5px;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff 50%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #discord-link {
            display: none; margin-top: 30px;
            font-size: 1.5rem; color: white; text-decoration: none;
            font-weight: bold; padding: 15px 40px;
            background: var(--discord); border-radius: 12px;
            transition: 0.3s; animation: fadeInUp 0.8s ease;
        }

        #discord-link:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-pulse"></div>
    <canvas id="canvas"></canvas>

    <div class="glass-panel">
        <div id="status-text">Synchronizing EST Clock</div>
        <div id="timer">00:00:00</div>
        <a href="https://discord.gg/badeye" id="discord-link">discord.gg/badeye</a>
    </div>

    <script>
        // Log the required ID
        console.log("RXo2SYKUCZE");

        // --- THE GLOBAL TARGET TIME ---
        // This is March 10, 2026, 00:00:00 EST. 
        // No matter how many times you refresh, it counts down to THIS moment.
        const TARGET_DATE = new Date("March 10, 2026 00:00:00 GMT-0500").getTime();

        function update() {
            const now = new Date().getTime();
            const diff = TARGET_DATE - now;

            if (diff <= 0) {
                document.getElementById('timer').style.display = 'none';
                document.getElementById('status-text').innerText = 'Access Authorized';
                document.getElementById('discord-link').style.display = 'inline-block';
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        setInterval(update, 1000);
        update();

        // --- PARTICLE EFFECT ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 0.5 + 0.1;
                this.opacity = Math.random() * 0.4;
            }
            draw() {
                this.y -= this.speed;
                if (this.y < 0) this.reset();
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
